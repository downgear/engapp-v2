services:
  postgres:
    image: postgres:16-alpine
    container_name: lingriser-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: lingriser
      POSTGRES_USER: lingriser
      POSTGRES_PASSWORD: lingriser
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./Backend/database/schema_postgres.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./Backend/database/seed_postgres.sql:/docker-entrypoint-initdb.d/02-seed.sql

volumes:
  pgdata:
